name: Continuous Deployment (Prod)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push todo image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: divyanshukumarsingh/next_todo:${{ github.sha }}

      - name: Clone repo, update image tags, and push tags
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git clone https://github.com/divkumarsingh/gitops.git

          sed -i 's|image: divyanshukumarsingh/next_todo:*| divyanshukumarsingh/next_todo:${{ github.sha }}|' manifest.yml

          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Updated the todo_server image to ${{ github.sha }}"
          git push https://${PAT}@github.com/divkumarsingh/gitops.git
